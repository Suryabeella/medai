<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MediAI | Upload Prescription</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/upload.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="upload-card">

    <h1>

        <i class="fa-solid fa-file-medical"></i>

        Upload Prescription

    </h1>

    <p>

        Upload your handwritten or printed prescription.
        MediAI will extract medicines using OCR and
        provide AI-powered medicine information with
        real-time availability.

    </p>

    <form

        id="uploadForm"

        action="{{ url_for('upload') }}"

        method="POST"

        enctype="multipart/form-data">

        <!-- Upload Area -->

        <label
            class="upload-area"
            for="prescription">

            <i class="fa-solid fa-cloud-arrow-up"></i>

            <h3>

                Drag & Drop

            </h3>

            <p>

                or Click here to Upload

            </p>

            <input

                type="file"

                id="prescription"

                name="prescription"

                accept=".png,.jpg,.jpeg"

                hidden

                required>

        </label>

        <!-- Preview -->

        <div class="preview">

            <img

                id="preview"

                src="#"

                alt="Preview">

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button

                type="button"

                id="uploadBtn">

                <i class="fa-solid fa-image"></i>

                Choose Image

            </button>

            <button

                type="submit"

                id="analyzeBtn">

                <i class="fa-solid fa-robot"></i>

                Analyze Prescription

            </button>

        </div>

    </form>

    <br>

    <a href="{{ url_for('dashboard') }}">

        <button class="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

            Back to Dashboard

        </button>

    </a>

</div>

</div>

<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

</body>

</html>
